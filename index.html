<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xogo de Repaso: A Enerxía</title>
    <style>
    :root {
        --primary: #ff9800; 
        --secondary: #ffc107;
        --accent: #4caf50;
        --bg: #fffde7;
        --text: #3e2723;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-height: 100vh;
    }

    header {
        background: var(--primary);
        color: white;
        width: 100%;
        padding: 1rem 0;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
        margin: 0;
        font-size: 1.5rem;
    }

    .game-container {
        width: 95%;
        max-width: 600px;
        margin-top: 1.5rem;
        perspective: 1000px;
    }

    .card {
        background: white;
        min-height: 400px; /* Altura mínima para mantener consistencia */
        height: auto;
        cursor: pointer;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .card.is-flipped {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
        border-radius: 20px;
        text-align: center;
        overflow-y: auto; /* Permite scroll interno si el texto es muy largo */
    }

    .card-front {
        border: 6px solid var(--secondary);
        background: #fff;
        z-index: 2;
    }

    .card-back {
        background: #fff8e1;
        transform: rotateY(180deg);
        border: 6px solid var(--accent);
    }

    .question-text { 
        font-size: 1.3rem; 
        font-weight: bold; 
        margin-bottom: 0.8rem; 
        color: #bf360c; 
    }

    .answer-text { 
        font-size: 1.15rem; 
        color: #1b5e20; 
        line-height: 1.4; 
    }
    
    .source-tag { 
        margin-top: 15px; 
        font-size: 0.8rem; 
        background: #f1f8e9; 
        padding: 6px 10px; 
        border-radius: 8px;
        color: #555;
        border: 1px solid #c5e1a5;
    }

    .controls {
        margin: 1.5rem 0;
        display: flex;
        gap: 15px;
        align-items: center;
        padding-bottom: 1rem;
    }

    button {
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
        box-shadow: 0 3px 5px rgba(0,0,0,0.1);
    }

    .btn-prev { background: #efebe9; color: #5d4037; }
    .btn-next { background: var(--accent); color: white; font-weight: bold; }
    
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .progress {
        font-size: 1.1rem;
        font-weight: bold;
        color: #5d4037;
        min-width: 80px;
        text-align: center;
    }

    /* Ajuste para pantallas muy pequeñas */
    @media (max-height: 600px) {
        .card { min-height: 300px; }
        .question-text { font-size: 1.1rem; }
        .answer-text { font-size: 1rem; }
    }
</style>

</head>
<body>

<header>
    <h1>⚡ A Enerxía: Repaso 💡</h1>
    <p>Tarxetas actualizadas segundo a imaxe proporcionada</p>
</header>

<div class="game-container">
    <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
        <div class="card-face card-front">
            <div class="question-text" id="question">Cargando...</div>
            <p style="color: #888;">Toca para xirar 🔄</p>
        </div>
        <div class="card-face card-back">
            <div class="answer-text" id="answer">...</div>
            <div class="source-tag" id="source"></div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn-prev" id="prevBtn" onclick="prevQuestion()">⬅️ Anterior</button>
    <div class="progress" id="progress">1 / 80</div>
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Seguinte ➡️</button>
</div>

<script>
    const questions = [

      { q: "Según el texto, ¿qué factores han marcado el progreso de las sociedades a lo largo del tiempo?", a: "El descubrimiento de nuevas fuentes de energía y la mejora de las técnicas para obtenerlas. Ubicación: Página 1, Apartado: A historia da enerxía", s: "" },
      { q: "Definición de recursos naturales.", a: "Bienes o sustancias presentes en la naturaleza que se pueden emplear para cubrir las necesidades de las personas. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "¿En qué dos grandes grupos se clasifican los recursos naturales según el uso que se les dé?", a: "Materias primas y fuentes de energía. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "Concepto: Materias primas", a: "Sustancias a partir de las cuales se obtienen materiales para fabricar nuevos productos (ej. madera o minerales). Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "¿Para qué sectores se emplea principalmente la energía obtenida de las fuentes de energía?", a: "Para los transportes, la industria o los hogares. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "¿Qué caracteriza a los recursos naturales renovables?", a: "Son prácticamente inagotables porque se renuevan continuamente en la naturaleza. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "Tres ejemplos de recursos naturales renovables.", a: "El viento, los cultivos y la luz del sol. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "¿Por qué se dice que los recursos no renovables pueden agotarse?", a: "Porque se encuentran en la naturaleza en cantidades limitadas y no se pueden perpetuar tras su uso. Ubicación: Página 2, Apartado: Recursos naturais", s: "" },
      { q: "¿Cuál fue la única fuente de luz y calor para el ser humano durante miles de años?", a: "La energía del sol. Ubicación: Página 2, Apartado: Sabías que...?", s: "" },
      { q: "Antes de las máquinas, ¿qué usaban los humanos como energía para realizar trabajos?", a: "La energía de sus propios músculos. Ubicación: Página 2, Apartado: Sabías que...?", s: "" },
      { q: "¿Qué deben sufrir las materias primas desde su obtención hasta convertirse en artículos útiles?", a: "Diferentes transformaciones. Ubicación: Página 3, Apartado: As materias primas", s: "" },
      { q: "¿De qué mineral se extrae el aluminio para fabricar objetos?", a: "De la bauxita. Ubicación: Página 3, Apartado: As materias primas", s: "" },
      { q: "¿Hace cuántos años comenzaron los humanos a controlar el fuego?", a: "Hace unos 500,000 años. Ubicación: Página 3, Apartado: Sabías que...?", s: "" },
      { q: "¿Cuál fue la primera fuente de energía que el ser humano consiguió dominar?", a: "El fuego (combustión de materia vegetal). Ubicación: Página 3, Apartado: Sabías que...?", s: "" },
      { q: "¿Cuáles son los tres posibles orígenes de las materias primas?", a: "Animal, vegetal y mineral. Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" },
      { q: "Dos ejemplos de materias primas de origen animal.", a: "La lana y las pieles. Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" },
      { q: "Dos ejemplos de materias primas de origen vegetal.", a: "La madera y el algodón (productos de la agricultura o forestales). Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" },
      { q: "¿De dónde se extraen las materias primas de origen mineral?", a: "De la corteza terrestre. Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" },
      { q: "Menciona tres materias primas de origen mineral.", a: "Hierro, oro, sal (o azufre y rocas). Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" },

      { q: "Dos ejemplos de materias primas no renovables.", a: "El mármol y el carbón. Ubicación: Página 4, Apartado: Materias primas non renovables", s: "" },
      { q: "¿Cuál es una forma efectiva de prolongar la vida de los recursos limitados de la Tierra?", a: "Reciclar todos los materiales que sea posible. Ubicación: Página 4, Apartado: Materias primas non renovables", s: "" },
      { q: "Concepto: Energía", a: "Capacidad que tiene un cuerpo de producir un cambio en él mismo o en otros sistemas. Ubicación: Página 5, Apartado: Fontes de enerxía", s: "" },

      { q: "¿Para qué tres propósitos principales usamos la energía los humanos?", a: "Obtener movimiento, obtener calor y obtener electricidad. Ubicación: Página 5, Apartado: Usos da enerxía", s: "" },

      { q: "Energía que transforma la fuerza del viento en electricidad.", a: "Energía eólica. Ubicación: Página 6, Apartado: Enerxías renovables", s: "" },
      { q: "Concepto: Energía geotérmica", a: "Aprovechamiento de la energía acumulada en forma de calor debajo de la superficie de la tierra. Ubicación: Página 7, Apartado: Enerxías renovables", s: "" },
      { q: "¿A partir de qué se obtiene la energía de biomasa?", a: "A partir de restos biodegradables de productos biológicos. Ubicación: Página 7, Apartado: Enerxías renovables", s: "" },
      { q: "¿Qué fenómeno natural aprovecha la energía hidráulica para generar electricidad?", a: "La caída del agua desde una cierta altura. Ubicación: Página 7, Apartado: Enerxías renovables", s: "" },
      { q: "¿Cuándo se construyeron los primeros molinos de agua para aprovechar la energía hidráulica?", a: "En el siglo III a. C. Ubicación: Página 7, Apartado: Sabías que...?", s: "" },
      { q: "¿Cómo se forma el carbón a lo largo de millones de años?", a: "Por la acumulación de restos vegetales en zonas sin oxígeno (pantanos o lagunas). Ubicación: Página 8, Apartado: Carbón", s: "" },
      { q: "Propiedades físicas del carbón.", a: "Es una roca de color negro que produce energía al quemarse. Ubicación: Página 8, Apartado: Carbón", s: "" },
      { q: "¿A partir de qué seres vivos se forma el petróleo?", a: "De seres vivos que se acumularon en el fondo de mares y lagunas. Ubicación: Página 8, Apartado: Petróleo", s: "" },
      { q: "Menciona dos productos derivados del petróleo que no sean combustibles.", a: "Plásticos y pinturas. Ubicación: Página 8, Apartado: Petróleo", s: "" },
      { q: "¿Qué grave consecuencia ambiental pueden tener los accidentes de petroleros?", a: "Producen mareas negras con consecuencias muy graves para el ecosistema. Ubicación: Página 8, Apartado: Sabías que...?", s: "" },
      { q: "¿Qué fuente de energía utilizaba la antigua máquina de vapor?", a: "El carbón. Ubicación: Página 8, Apartado: Un reto antes de seguir", s: "" },
      { q: "¿Qué es el gas natural?", a: "Una mezcla de gases que se puede quemar para producir energía. Ubicación: Página 8, Apartado: Gas natural", s: "" },
      { q: "¿Qué dos recursos naturales se emplean para obtener energía nuclear?", a: "El plutonio y el uranio. Ubicación: Página 9, Apartado: Enerxía nuclear", s: "" },
      { q: "¿Cuántas toneladas de carbón se necesitan para igualar la energía de un solo kilo de uranio?", a: "Unas mil toneladas. Ubicación: Página 9, Apartado: Sabías que...?", s: "" },
      { q: "¿Cuál es el principal inconveniente de la producción de energía nuclear?", a: "La radiación que se produce es peligrosa. Ubicación: Página 9, Apartado: Sabías que...?", s: "" },
      { q: "¿Por qué se considera insostenible el modelo energético mundial actual?", a: "Porque el planeta no puede suministrar indefinidamente los recursos que exige el modelo basado en combustibles fósiles. Ubicación: Página 9, Apartado: Desenvolvementosostible", s: "" },
      { q: "Concepto: Modelo sostenible", a: "Modelo que permite mejorar nuestra vida pero de forma respetuosa con la Tierra. Ubicación: Página 9, Apartado: Desenvolvementosostible", s: "" },
      { q: "¿Quién fue Wangari Muta Maathai y por qué recibió el Premio Nobel de la Paz?", a: "Bióloga keniana premiada en 2004 por su contribución al desarrollo sostenible. Ubicación: Página 9, Apartado: Sabías que...?", s: "" },
      { q: "¿En qué consistió el 'Movimiento Cinturón Verde' de Wangari Maathai?", a: "En la plantación de millones de árboles en su país (Kenia). Ubicación: Página 9, Apartado: Sabías que...?", s: "" },
      { q: "¿Qué ocurre con los recursos naturales a medida que se agotan en el modelo actual?", a: "Cada vez es más difícil y costoso conseguirlos. Ubicación: Página 10, Apartado: O modelo actual", s: "" },
      { q: "Entre las energías renovables y no renovables, ¿cuáles son más contaminantes?", a: "Las energías no renovables. Ubicación: Página 10, Apartado: O modelo actual", s: "" },
      { q: "¿Cuál es el primer pilar de un modelo energético sostenible respecto al acceso?", a: "Que todos y todas podamos acceder a la energía a un precio razonable. Ubicación: Página 10, Apartado: Modelos enerxéticos sostibles", s: "" },
      { q: "¿Qué tipo de energías son hoy las más respetuosas con el medio ambiente?", a: "Las energías renovables. Ubicación: Página 10, Apartado: Modelos enerxéticos sostibles", s: "" },
      { q: "¿Qué día se celebra el Día Internacional de la Energía Limpia?", a: "El 26 de abril. Ubicación: Página 10, Apartado: Sabías que...?", s: "" },
      { q: "¿Cuántos Objetivos de Desarrollo Sostenible (ODS) establecieron los líderes mundiales?", a: "17 objetivos. Ubicación: Página 11, Apartado: Obxectivos de Desenvolvemento Sostible (ODS)", s: "" },
      { q: "¿Cuál es el plazo de tiempo fijado para alcanzar las metas de los ODS desde 2015?", a: "15 años. Ubicación: Página 11, Apartado: Obxectivos de Desenvolvemento Sostible (ODS)", s: "" },
      { q: "Definición: Biodegradable", a: "Materia que puede ser descompuesta por bacterias y otros organismos de la naturaleza. Ubicación: Página 11, Apartado: Glosario", s: "" },
      { q: "¿Qué es la corteza terrestre?", a: "Es la capa más superficial de la Tierra, formada por rocas, y puede ser continental u oceánica. Ubicación: Página 11, Apartado: Glosario", s: "" },
      { q: "Define combustibles fósiles según el glosario.", a: "Depósitos biológicos formados por descomposición de animales o plantas de hace millones de años (petróleo, carbón o gas). Ubicación: Página 11, Apartado: Glosario", s: "" },
      { q: "Concepto: Ondas", a: "Perturbaciones que se propagan en un medio a partir de un punto de origen (ej. el sonido). Ubicación: Página 11, Apartado: Glosario", s: "" },

      { q: "La energía es la capacidad de producir un cambio; estos cambios pueden ser movimiento o variaciones de _____.", a: "Temperatura. Ubicación: Página 5, Apartado: Fontes de enerxía", s: "" },
      { q: "La energía hidráulica aprovecha la caída del agua para generar energía _____.", a: "Eléctrica. Ubicación: Página 7, Apartado: Enerxías renovables", s: "" },
      { q: "El petróleo es una roca _____ de color negro.", a: "Líquida. Ubicación: Página 8, Apartado: Petróleo", s: "" },
      { q: "El uranio permite producir mucha energía pero emite _____.", a: "Radiación. Ubicación: Página 9, Apartado: Sabías que...?", s: "" },
      { q: "El modelo energético actual depende excesivamente de los _____.", a: "Combustibles fósiles. Ubicación: Página 9, Apartado: Desenvolvementosostible", s: "" },
      { q: "¿En qué año se comprometieron los líderes mundiales con los ODS?", a: "En 2015. Ubicación: Página 11, Apartado: Obxectivos de Desenvolvemento Sostible (ODS)", s: "" },
      { q: "Las materias primas de origen mineral se extraen de la _____ terrestre.", a: "Corteza (o codia). Ubicación: Página 4, Apartado: Orixe das materias primas", s: "" }
    ];

    let currentIdx = 0;
    const qElem = document.getElementById('question');
    const aElem = document.getElementById('answer');
    const sElem = document.getElementById('source');
    const pElem = document.getElementById('progress');
    const card = document.getElementById('card');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function updateCard() {
        card.classList.remove('is-flipped');
        prevBtn.disabled = (currentIdx === 0);
        nextBtn.disabled = (currentIdx === questions.length - 1);

        setTimeout(() => {
            qElem.innerText = questions[currentIdx].q;
            aElem.innerText = questions[currentIdx].a;
            sElem.innerText = "📍 Referencia: " + questions[currentIdx].s;
            pElem.innerText = `${currentIdx + 1} / ${questions.length}`;
        }, 150);
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            updateCard();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            updateCard();
        }
    }

    updateCard();

    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight") nextQuestion();
        if (e.key === "ArrowLeft") prevQuestion();
        if (e.key === " " || e.key === "Enter") card.classList.toggle('is-flipped');
    });
</script>

</body>
</html>
