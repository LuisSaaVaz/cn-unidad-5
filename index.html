<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="UTF-8">

  <style>
    :root {
        --primary: #ff9800; 
        --secondary: #ffc107;
        --accent: #4caf50;
        --bg: #fffde7;
        --text: #3e2723;
        --inactive: #bdbdbd; /* Gris para botones inactivos */
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        background: var(--primary);
        color: white;
        width: 100%;
        padding: 1rem 0;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
        margin: 0;
        font-size: 1.5rem;
    }

    .mode-selector {
        margin-top: 1rem;
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .btn-mode {
        background: var(--inactive); /* Fondo gris por defecto */
        color: white;               /* Texto blanco por defecto */
        border: 2px solid white;
        font-weight: bold;
        padding: 8px 20px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-mode.active {
        background: white;          /* Fondo blanco cuando está activo */
        color: var(--primary);      /* Texto naranja cuando está activo */
        border: 2px solid white;
    }

    .game-container {
        width: 95%;
        max-width: 600px;
        margin-top: 1rem;
        perspective: 1000px;
    }

    .card {
        background: white;
        min-height: 400px;
        height: auto;
        cursor: pointer;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .card.is-flipped {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
        border-radius: 20px;
        text-align: center;
        overflow-y: auto;
    }

    .card-front {
        border: 6px solid var(--secondary);
        background: #fff;
        z-index: 2;
    }

    .card-back {
        background: #fff8e1;
        transform: rotateY(180deg);
        border: 6px solid var(--accent);
    }

    .question-text { 
        font-size: 1.3rem; 
        font-weight: bold; 
        margin-bottom: 0.8rem; 
        color: #bf360c; 
    }

    .answer-text { 
        font-size: 1.15rem; 
        color: #1b5e20; 
        line-height: 1.4; 
    }
    
    .source-tag { 
        margin-top: 15px; 
        font-size: 0.8rem; 
        background: #f1f8e9; 
        padding: 6px 10px; 
        border-radius: 8px;
        color: #555;
        border: 1px solid #c5e1a5;
    }

    .controls {
        margin: 1.5rem 0;
        display: flex;
        gap: 15px;
        align-items: center;
        padding-bottom: 1rem;
    }

    button {
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
        box-shadow: 0 3px 5px rgba(0,0,0,0.1);
    }

    .btn-prev { background: #efebe9; color: #5d4037; }
    .btn-next { background: var(--accent); color: white; font-weight: bold; }
    
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .progress {
        font-size: 1.1rem;
        font-weight: bold;
        color: #5d4037;
        min-width: 80px;
        text-align: center;
    }

    @media (max-height: 600px) {
        .card { min-height: 300px; }
        .question-text { font-size: 1.1rem; }
        .answer-text { font-size: 1rem; }
    }
  </style>

</head>
<body>

<header>
    <h1>⚡ A Enerxía: Repaso 💡</h1>
    <div class="mode-selector">

</header>

<div class="game-container">
    <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">

            <p style="color: #888;">Toca para xirar 🔄</p>

        <div class="card-face card-back">

<div class="controls">

      { q: "¿Qué fuerza utiliza la energía hidráulica?", a: "Utiliza la fuerza del agua al caer para producir electricidad.", s: "Tipos de energías renovables" },
      { q: "¿Qué son las energías no renovables?", a: "Son las que se agotan al usarlas porque existen en cantidades limitadas, como los combustibles fósiles.", s: "Energías no renovables" },
      { q: "¿Que fuentes de energía no renovables existen?", a: "El carbón, el petróleo, el gas natural y las empleadas para la producción de energía nuclear.", s: "Energías no renovables" },
      { q: "¿Cómo se forma el carbón?", a: "Durante millones de años a partir de restos de plantas.", s: "Energías no renovables" },
      { q: "¿Cómo se forma el petróleo y para qué se usa?", a: "Se forma durante millones de años a partir de seres vivos y se usa como combustible y para fabricar plásticos y pinturas.", s: "Energías no renovables" },
      { q: "¿Qué es el gas natural, para qué se usa y donde se encuentra?", a: "Es una mezcla de gases que se quema para producir energía, usada en calefacción y agua caliente, se suele encontrar bajo tierra, a veces junto a los depósitos de petróleo.", s: "Energías no renovables" },
      { q: "¿Qué materiales se utilizan para obtener energía nuclear y para qué se utiliza?", a: "Se utilizan materiales como el uranio o el plutonio. Se produce electricidad en las centrales nucleares", s: "Energías no renovables" }
    ];

    let currentQuestions = questionsTema;
    let currentIdx = 0;

    const qElem = document.getElementById('question');
    const aElem = document.getElementById('answer');
    const sElem = document.getElementById('source');
    const pElem = document.getElementById('progress');
    const card = document.getElementById('card');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const btnTema = document.getElementById('modeTema');
    const btnResumen = document.getElementById('modeResumen');

    function setMode(mode) {
        if (mode === 'tema') {
            currentQuestions = questionsTema;
            btnTema.classList.add('active');
            btnResumen.classList.remove('active');
        } else {
            currentQuestions = questionsResumen;
            btnResumen.classList.add('active');
            btnTema.classList.remove('active');
        }
        currentIdx = 0;
        updateCard();
    }

    function updateCard() {
        card.classList.remove('is-flipped');
        prevBtn.disabled = (currentIdx === 0);
        nextBtn.disabled = (currentIdx === currentQuestions.length - 1);

        setTimeout(() => {
            qElem.innerText = currentQuestions[currentIdx].q;
            aElem.innerText = currentQuestions[currentIdx].a;
            sElem.innerText = currentQuestions[currentIdx].s ? "📍 Referencia: " + currentQuestions[currentIdx].s : "";
            pElem.innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        }, 150);
    }

    function nextQuestion() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            updateCard();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            updateCard();
        }
    }

    updateCard();

    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight") nextQuestion();
        if (e.key === "ArrowLeft") prevQuestion();
        if (e.key === " " || e.key === "Enter") card.classList.toggle('is-flipped');
    });
</script>

</body>
</html>
